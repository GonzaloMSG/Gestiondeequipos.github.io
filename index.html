<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FutbolApp</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg1:#ffffff;--bg2:#f5f5f5;--bg3:#e8e8e8;
  --text1:#111111;--text2:#555555;--text3:#888888;
  --border1:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --radius-md:8px;--radius-lg:14px;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;
  --red:#A32D2D;--red-l:#FCEBEB;--red-d:#791F1F;
  --green:#3B6D11;--amber:#854F0B;--gold:#EF9F27;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg1:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text1:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border1:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);
    --blue-l:#0c2d4f;--red-l:#4a1515;
  }
}
html,body{height:100%;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;color:var(--text1);background:var(--bg2)}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:1400px;margin:0 auto;background:var(--bg1)}
.topbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:0.5px solid var(--border1);background:var(--bg2);flex-wrap:wrap;position:sticky;top:0;z-index:20}
.topbar-title{font-size:15px;font-weight:700;color:var(--text1);margin-right:2px}
.tab-row{display:flex;gap:3px;margin-left:auto}
.main{display:grid;grid-template-columns:210px 1fr;flex:1;min-height:0}
@media(max-width:680px){
  .main{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{height:auto;max-height:230px;position:static;border-right:none;border-bottom:0.5px solid var(--border1)}
  .sidebar-body{max-height:140px}
  .topbar{gap:4px;padding:6px 10px}
  .topbar-title{font-size:13px}
}
.sidebar{border-right:0.5px solid var(--border1);display:flex;flex-direction:column;height:calc(100dvh - 49px);position:sticky;top:49px;overflow:hidden}
.sidebar-header{padding:7px 10px;border-bottom:0.5px solid var(--border1);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-filters{padding:6px;border-bottom:0.5px solid var(--border1);flex-shrink:0;display:flex;flex-direction:column;gap:4px}
.sidebar-body{flex:1;overflow-y:auto;padding:5px;-webkit-overflow-scrolling:touch}
.content{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
input,select,textarea{padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:var(--bg1);color:var(--text1);font-size:13px;font-family:inherit;width:100%;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
button{padding:7px 13px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:var(--bg1);color:var(--text1);font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .12s;touch-action:manipulation;min-height:34px}
button:hover{background:var(--bg2)}
button:active{opacity:0.75}
.btn-blue{background:var(--blue)!important;color:#fff!important;border-color:var(--blue)!important}
.btn-green{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important}
.btn-red{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important}
.btn-amber{background:var(--amber)!important;color:#fff!important;border-color:var(--amber)!important}
.btn-gold{background:#8a6500!important;color:#fff!important;border-color:#8a6500!important}
.btn-sm{padding:4px 9px;font-size:11px;min-height:28px}
.tab{padding:6px 12px;font-size:12px;border-radius:var(--radius-md);border:0.5px solid var(--border2);cursor:pointer;background:var(--bg1);color:var(--text1);min-height:32px;touch-action:manipulation}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.mode-btn{padding:6px 10px;font-size:12px;border-radius:var(--radius-md);border:0.5px solid var(--border2);cursor:pointer;background:var(--bg1);color:var(--text1);min-height:32px}
.mode-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.pcard{border:0.5px solid var(--border1);border-radius:var(--radius-md);padding:7px 9px;margin-bottom:5px;cursor:pointer;background:var(--bg1);transition:border-color .12s,opacity .12s;touch-action:manipulation}
.pcard:active{background:var(--bg2)}
.pcard.in-team{opacity:0.42}
.pcard-name{font-weight:600;font-size:12px;color:var(--text1)}
.pcard-meta{font-size:10px;color:var(--text2);margin-top:1px}
.global-bar-wrap{height:4px;background:var(--bg3);border-radius:2px;margin-top:4px;overflow:hidden}
.global-bar{height:100%;border-radius:2px;transition:width .3s}
.field-wrap{border-radius:var(--radius-md);overflow:hidden;border:0.5px solid var(--border2)}
.field-header{padding:8px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;color:#fff;gap:4px;flex-wrap:wrap}
.field-body{position:relative;background:#246e24;padding:10px 8px 6px}
.field-svg-lines{position:absolute;inset:0;pointer-events:none;opacity:0.18}
.field-rows{display:flex;flex-direction:column;gap:7px;position:relative;z-index:1}
.field-row{display:flex;gap:5px;justify-content:center;align-items:center}
.field-row-label{font-size:9px;color:rgba(255,255,255,0.4);width:30px;text-align:right;flex-shrink:0}
.player-slot{border:1.5px dashed rgba(255,255,255,0.28);border-radius:8px;min-width:66px;min-height:62px;display:flex;align-items:center;justify-content:center;transition:border-color .12s,background .12s;position:relative;touch-action:manipulation}
.player-slot.drag-over{border-color:#fff;background:rgba(255,255,255,0.14)}
.player-slot.occupied{border-style:solid}
.player-chip{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 3px;width:100%;user-select:none}
.chip-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.chip-name{font-size:9px;color:#fff;font-weight:500;text-align:center;line-height:1.2;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-global{font-size:9px;font-weight:700}
.chip-gk-badge{font-size:8px;background:rgba(255,200,0,0.92);color:#412402;padding:1px 5px;border-radius:8px;font-weight:700}
.chip-rotation{font-size:8px;background:rgba(255,255,255,0.2);color:#fff;padding:1px 4px;border-radius:6px;font-weight:500;margin-top:1px}
.chip-remove{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;padding:0;line-height:1;touch-action:manipulation;min-height:unset;opacity:0;transition:opacity .12s}
.player-slot:hover .chip-remove{opacity:1}
@media(pointer:coarse){.chip-remove{opacity:1;width:20px;height:20px}}
.subs-section{border-top:0.5px solid rgba(255,255,255,0.1);margin-top:5px;padding-top:5px}
.sub-chip{display:inline-block;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);border-radius:12px;padding:3px 8px;font-size:9px;color:rgba(255,255,255,0.7);margin:2px;cursor:pointer;touch-action:manipulation}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
@media(max-width:560px){.metrics-row{grid-template-columns:repeat(2,1fr)}}
.metric-card{background:var(--bg2);border-radius:var(--radius-md);padding:8px 10px}
.metric-label{font-size:10px;color:var(--text2);margin-bottom:2px}
.metric-val{font-size:20px;font-weight:700;color:var(--text1)}
.fields-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
.tag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600}
.section-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.saved-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.list-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.list-table th{font-size:10px;font-weight:700;color:var(--text2);text-align:left;padding:5px 5px;border-bottom:0.5px solid var(--border1);background:var(--bg2)}
.list-table td{padding:5px 5px;border-bottom:0.5px solid var(--border1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-table tr:hover td{background:var(--bg2)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:flex-end;justify-content:center;z-index:1000;padding:0}
@media(min-width:500px){.modal-overlay{align-items:center;padding:16px}}
.modal-box{background:var(--bg1);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;padding:18px 18px 24px;position:relative;-webkit-overflow-scrolling:touch}
@media(min-width:500px){.modal-box{border-radius:var(--radius-lg);padding:20px}}
.modal-handle{width:38px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px}
@media(min-width:500px){.modal-handle{display:none}}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--text1)}
.form-row{margin-bottom:11px}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:500}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-section{background:var(--bg2);border-radius:var(--radius-md);padding:10px;margin-bottom:11px}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.stat-row:last-child{margin-bottom:0}
.stat-row label{width:65px;font-size:11px;color:var(--text2);flex-shrink:0;font-weight:500}
.stat-row input[type=range]{flex:1;cursor:pointer;height:22px}
.stat-val{width:30px;text-align:right;font-size:13px;font-weight:700;color:var(--text1)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:12px}
.explain-item{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:0.5px solid var(--border1);font-size:11px}
.explain-item:last-child{border-bottom:none}
/* ROTATION */
.rotation-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border1);font-size:12px}
.rotation-item:last-child{border-bottom:none}
.rotation-num{width:20px;height:20px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--text2)}
.rotation-num.first{background:var(--gold);color:#412402}
/* COIN */
.coin{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;border:4px solid transparent;position:relative;flex-shrink:0;margin:0 auto}
.coin-spinning{animation:coinFlip 0.75s ease-in-out infinite}
.coin-result{animation:coinPop 0.35s ease-out forwards}
@keyframes coinFlip{0%{transform:rotateY(0) scale(1)}50%{transform:rotateY(90deg) scale(0.8)}100%{transform:rotateY(0) scale(1)}}
@keyframes coinPop{0%{transform:scale(0.6)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.kickoff-badge{display:inline-flex;align-items:center;gap:3px;background:var(--gold);color:#412402;border-radius:10px;padding:2px 7px;font-size:9px;font-weight:700}
/* MOBILE BAR */
@media(max-width:680px){
  .desktop-only{display:none!important}
  /* Toda la app ocupa la pantalla sin scroll externo */
  html,body{height:100%;overflow:hidden}
  .app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
  /* topbar fijo arriba */
  .topbar{flex-shrink:0}
  /* sidebar fijo — no baja con el contenido */
  .sidebar{
    flex-shrink:0;
    position:sticky;
    top:0;
    z-index:10;
    height:auto;
    max-height:185px;
    border-right:none;
    border-bottom:1px solid var(--border2);
    background:var(--bg1);
    overflow:hidden;
  }
  .sidebar-body{max-height:95px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  /* main: flex column, sidebar arriba, content abajo scrolleable */
  .main{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;grid-template-columns:unset}
  /* solo el content scrollea */
  .content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px}
  .fields-grid{grid-template-columns:1fr!important}
  /* mobile-bar pegada al fondo */
  .mobile-bar{display:flex;gap:5px;padding:8px 10px;border-top:0.5px solid var(--border1);background:var(--bg2);flex-wrap:wrap;justify-content:center;flex-shrink:0;z-index:15}
  .mobile-bar button{flex:1;min-width:0;font-size:11px;padding:8px 5px;min-height:36px}
}
@media(min-width:681px){
  .mobile-bar{display:none}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const TEAM_COLORS={
  A:{main:'#185FA5',light:'#E6F1FB',dark:'#0C447C',name:'Azul'},
  B:{main:'#A32D2D',light:'#FCEBEB',dark:'#791F1F',name:'Rojo'}
};
const POS_LABELS={A:'Adelante',M:'Medio',T:'Atrás'};
const POS_KEYS=['A','M','T'];
const AVATAR_COLS=['#185FA5','#0F6E56','#993C1D','#534AB7','#993556','#639922','#854F0B','#A32D2D'];
const F5_SLOTS={A:2,M:1,T:1};
const F7_SLOTS={A:2,M:2,T:2};

let S={
  players:loadStorage('fbv2_players')||defaultPlayers(),
  mode:'F7',view:'field',
  teams:emptyTeams(),
  hasSplit:false,
  dragPid:null,dragFrom:null,
  search:'',posFilter:'',
  explanation:[],
  savedTeams:loadStorage('fbv2_saved')||[],
  weights:{
    G:{A:0.35,M:0.30,T:0.25,Q:0.10},
    A:{A:0.70,M:0.20,T:0.05,Q:0.05},
    M:{A:0.15,M:0.60,T:0.20,Q:0.05},
    T:{A:0.05,M:0.25,T:0.65,Q:0.05},
    Q:{A:0.00,M:0.05,T:0.10,Q:0.85}
  },
  kickoff:null,
  gkRotation:{A:[],B:[]},
};

function emptyTeams(){return{A:{slots:{A:[],M:[],T:[]},gk:null,subs:[]},B:{slots:{A:[],M:[],T:[]},gk:null,subs:[]}}}
function loadStorage(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function saveStorage(){localStorage.setItem('fbv2_players',JSON.stringify(S.players));localStorage.setItem('fbv2_saved',JSON.stringify(S.savedTeams))}

function defaultPlayers(){
  return[
    {id:'p1',n:'Carlos Méndez',d:'1',A:20,M:30,T:40,Q:88,pos:'T',pie:'Der',notas:'Buen arquero'},
    {id:'p2',n:'Diego Flores',d:'4',A:25,M:55,T:80,Q:10,pos:'T',pie:'Der',notas:''},
    {id:'p3',n:'Matías Romero',d:'5',A:30,M:60,T:75,Q:5,pos:'T',pie:'Zur',notas:''},
    {id:'p4',n:'Lucas García',d:'3',A:45,M:65,T:55,Q:0,pos:'T',pie:'Der',notas:''},
    {id:'p5',n:'Andrés Suárez',d:'6',A:40,M:72,T:60,Q:0,pos:'M',pie:'Der',notas:''},
    {id:'p6',n:'Fernando López',d:'8',A:65,M:78,T:40,Q:0,pos:'M',pie:'Der',notas:''},
    {id:'p7',n:'Sebastián Ruiz',d:'10',A:80,M:70,T:20,Q:0,pos:'M',pie:'Zur',notas:'Capitán'},
    {id:'p8',n:'Nicolás Torres',d:'7',A:75,M:55,T:30,Q:0,pos:'A',pie:'Der',notas:''},
    {id:'p9',n:'Rodrigo Jiménez',d:'11',A:70,M:50,T:25,Q:0,pos:'A',pie:'Zur',notas:''},
    {id:'p10',n:'Pablo Martínez',d:'9',A:90,M:60,T:15,Q:0,pos:'A',pie:'Der',notas:'Goleador'},
    {id:'p11',n:'Tomás Vargas',d:'2',A:85,M:55,T:20,Q:0,pos:'A',pie:'Zur',notas:''},
    {id:'p12',n:'Ramiro Castro',d:'12',A:50,M:60,T:50,Q:15,pos:'M',pie:'Der',notas:'Puede atajar'}
  ];
}

function calcGlobal(p){const w=S.weights.G;return Math.round(w.A*p.A+w.M*p.M+w.T*p.T+w.Q*p.Q)}
function calcScore(p,pos){const w=S.weights[pos]||S.weights.M;return Math.round(w.A*p.A+w.M*p.M+w.T*p.T+w.Q*p.Q)}
function getGlobalColor(g){return g>=75?'#3B6D11':g>=50?'#854F0B':'#A32D2D'}
function getInitials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function getAvatarColor(id){return AVATAR_COLS[Math.abs([...id].reduce((a,c)=>a+c.charCodeAt(0),0))%AVATAR_COLS.length]}
function getSlotCount(){return S.mode==='F5'?F5_SLOTS:F7_SLOTS}
function playerById(id){return S.players.find(p=>p.id===id)}
function allInTeamIds(){
  const ids=new Set();
  ['A','B'].forEach(t=>{
    POS_KEYS.forEach(r=>(S.teams[t].slots[r]||[]).forEach(id=>id&&ids.add(id)));
    if(S.teams[t].gk)ids.add(S.teams[t].gk);
    S.teams[t].subs.forEach(id=>ids.add(id));
  });
  return ids;
}
function getTeamSum(t){
  let s=0;
  POS_KEYS.forEach(r=>(S.teams[t].slots[r]||[]).forEach(id=>{const p=playerById(id);if(p)s+=calcGlobal(p)}));
  if(S.teams[t].gk){const p=playerById(S.teams[t].gk);if(p)s+=calcGlobal(p)}
  return s;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

/* DIVISION */
function splitBalanced(){
  const sc=getSlotCount();
  const all=S.players.map(p=>({...p,global:calcGlobal(p)})).sort((a,b)=>b.global-a.global);
  const used=new Set();const expls=[];
  const nt=emptyTeams();
  const byQ=[...all].sort((a,b)=>b.Q-a.Q);
  if(byQ[0]){nt.A.gk=byQ[0].id;used.add(byQ[0].id);expls.push({team:'A',player:byQ[0],pos:'Arquero',reason:'Mejor stat arquero: '+byQ[0].Q})}
  if(byQ[1]){nt.B.gk=byQ[1].id;used.add(byQ[1].id);expls.push({team:'B',player:byQ[1],pos:'Arquero',reason:'2° mejor arquero: '+byQ[1].Q})}
  let sumA=nt.A.gk?calcGlobal(playerById(nt.A.gk)):0;
  let sumB=nt.B.gk?calcGlobal(playerById(nt.B.gk)):0;
  POS_KEYS.forEach(row=>{
    const cnt=sc[row];
    for(let i=0;i<cnt*2;i++){
      const cands=all.filter(p=>!used.has(p.id)).sort((a,b)=>calcScore(b,row)-calcScore(a,row));
      if(!cands.length)break;
      const p=cands[0];const team=sumA<=sumB?'A':'B';
      nt[team].slots[row].push(p.id);
      if(team==='A')sumA+=p.global;else sumB+=p.global;
      used.add(p.id);
      expls.push({team,player:p,pos:POS_LABELS[row],reason:'Score '+calcScore(p,row)+' en '+POS_LABELS[row]+', global '+p.global});
    }
  });
  const subs=all.filter(p=>!used.has(p.id)).map(p=>p.id);
  const half=Math.ceil(subs.length/2);
  nt.A.subs=subs.slice(0,half);nt.B.subs=subs.slice(half);
  S.teams=nt;S.hasSplit=true;S.view='field';S.explanation=expls;S.kickoff=null;S.gkRotation={A:[],B:[]};
  render();
}

/* MONEDA */
function launchCoin(){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.innerHTML=`<div class="modal-box" style="max-width:340px;text-align:center">
    <div class="modal-handle"></div>
    <div class="modal-title" style="text-align:center">Lanzar moneda</div>
    <div style="padding:20px 0 16px">
      <div class="coin coin-spinning" id="coin-el" style="background:#B8860B;border-color:#8a6500;color:#fff">🪙</div>
      <div style="font-size:13px;color:var(--text2);margin-top:14px" id="coin-status">Lanzando...</div>
    </div>
    <div id="coin-result-area" style="min-height:50px"></div>
    <div class="modal-actions" style="justify-content:center;margin-top:8px">
      <button onclick="closeModal()" class="btn-sm">Cerrar</button>
      <button class="btn-gold btn-sm" onclick="closeModal();launchCoin()">Relanzar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});
  let spins=0;
  const winner=Math.random()<0.5?'A':'B';
  const tc=TEAM_COLORS[winner];
  const interval=setInterval(()=>{
    spins++;
    const el=document.getElementById('coin-el');
    if(el)el.textContent=spins%2===0?'🪙':'⚽';
    if(spins>=12){
      clearInterval(interval);
      const el2=document.getElementById('coin-el');
      const st=document.getElementById('coin-status');
      const ra=document.getElementById('coin-result-area');
      if(!el2)return;
      el2.className='coin coin-result';
      el2.style.background=tc.main;el2.style.borderColor=tc.dark;el2.style.color='#fff';el2.textContent='⚽';
      if(st)st.textContent='';
      if(ra)ra.innerHTML=`<div style="font-size:20px;font-weight:700;color:${tc.main};margin-bottom:4px">¡Equipo ${tc.name}!</div><div style="font-size:13px;color:var(--text2)">comienza con la pelota</div>`;
      S.kickoff=winner;
      setTimeout(()=>render(),200);
    }
  },120);
}

/* ARQUERO ALEATORIO */
function randomGKRotation(teamKey){
  const team=S.teams[teamKey];
  const allIds=[...(team.slots.A||[]),...(team.slots.M||[]),...(team.slots.T||[]),...(team.gk?[team.gk]:[]),...team.subs].filter(Boolean);
  if(!allIds.length){alert('No hay jugadores en el equipo '+TEAM_COLORS[teamKey].name);return}
  const shuffled=shuffle(allIds);
  S.gkRotation[teamKey]=shuffled;
  S.teams[teamKey].gk=shuffled[0];
  const tc=TEAM_COLORS[teamKey];
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='modal-overlay';
  const items=shuffled.map((id,i)=>{
    const p=playerById(id);if(!p)return'';
    const g=calcGlobal(p);
    return`<div class="rotation-item">
      <div class="rotation-num${i===0?' first':''}">${i+1}</div>
      <div class="chip-avatar" style="background:${getAvatarColor(p.id)};width:26px;height:26px;font-size:9px;flex-shrink:0">${getInitials(p.n)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:12px">${esc(p.n)}${p.d?` <span style="color:var(--text3)">#${p.d}</span>`:''}</div>
        <div style="font-size:10px;color:var(--text2)">Global <span style="font-weight:700;color:${getGlobalColor(g)}">${g}</span> · Arq=${p.Q}</div>
      </div>
      ${i===0?`<span style="background:${tc.main};color:#fff;border-radius:10px;padding:2px 7px;font-size:9px;font-weight:700">ARQ inicial</span>`:`<span style="font-size:10px;color:var(--text3)">Turno ${i+1}</span>`}
    </div>`;
  }).join('');
  overlay.innerHTML=`<div class="modal-box" style="max-width:400px">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${tc.main};margin-right:6px;vertical-align:middle"></span>
      Rotación arqueros — Equipo ${tc.name}
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Orden aleatorio. El primero va al arco primero.</div>
    <div style="border:0.5px solid var(--border1);border-radius:var(--radius-md);overflow:hidden;margin-bottom:4px">
      <div style="background:var(--bg2);padding:7px 10px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em">Orden de rotación</div>
      <div style="padding:4px 10px">${items}</div>
    </div>
    <div class="modal-actions">
      <button onclick="closeModal()" class="btn-sm">Cerrar</button>
      <button class="btn-blue btn-sm" onclick="closeModal();randomGKRotation('${teamKey}')">Regenerar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});
  render();
}

/* DRAG & DROP */
function handleSlotDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function handleSlotDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function handleSlotDrop(e,team,row,idx){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const pid=S.dragPid;if(!pid)return;
  removePlayerFromAllSlots(pid);
  const slots=S.teams[team].slots[row];
  while(slots.length<=idx)slots.push(null);
  slots[idx]=pid;S.dragPid=null;S.dragFrom=null;render();
}
function handleGKDrop(e,team){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const pid=S.dragPid;if(!pid)return;
  removePlayerFromAllSlots(pid);S.teams[team].gk=pid;S.dragPid=null;S.dragFrom=null;render();
}
function handleSubsDrop(e,team){
  e.preventDefault();
  const pid=S.dragPid;if(!pid)return;
  removePlayerFromAllSlots(pid);S.teams[team].subs.push(pid);S.dragPid=null;S.dragFrom=null;render();
}
function removePlayerFromAllSlots(pid){
  ['A','B'].forEach(t=>{
    POS_KEYS.forEach(r=>{S.teams[t].slots[r]=S.teams[t].slots[r].map(x=>x===pid?null:x)});
    S.teams[t].subs=S.teams[t].subs.filter(x=>x!==pid);
    if(S.teams[t].gk===pid)S.teams[t].gk=null;
  });
}
function removeFromSlot(team,row,idx){S.teams[team].slots[row][idx]=null;render()}
function removeGK(team){S.teams[team].gk=null;render()}
function removeFromSubs(team,pid){S.teams[team].subs=S.teams[team].subs.filter(x=>x!==pid);render()}

/* MODAL JUGADOR */

  const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});
  overlay.innerHTML=`<div class="modal-box" role="dialog" aria-modal="true">
    <div class="modal-handle"></div>
    <div class="modal-title">${isEdit?'Editar jugador':'Nuevo jugador'}</div>
    <div class="form-grid-2">
      <div class="form-row"><label>Nombre *</label><input id="fn" value="${esc(p.n)}" placeholder="Nombre completo" autocomplete="off"></div>
      <div class="form-row"><label>Dorsal</label><input id="fd" value="${esc(p.d||'')}" type="number" min="1" max="99" placeholder="#"></div>
    </div>
    <div class="form-grid-2">
      <div class="form-row"><label>Posición preferida</label><select id="fp">
        <option value="A"${p.pos==='A'?' selected':''}>Adelante</option>
        <option value="M"${p.pos==='M'?' selected':''}>Medio</option>
        <option value="T"${p.pos==='T'?' selected':''}>Atrás</option>
      </select></div>
      <div class="form-row"><label>Pie dominante</label><select id="fpie">
        <option${p.pie==='Der'?' selected':''}>Der</option>
        <option${p.pie==='Zur'?' selected':''}>Zur</option>
        <option${p.pie==='Amb'?' selected':''}>Amb</option>
      </select></div>
    </div>
    <div class="stat-section">
      <div class="section-title">Estadísticas (0–100)</div>
      ${[['A','Adelante','#378ADD'],['M','Medio','#1D9E75'],['T','Atrás','#BA7517'],['Q','Arquero','#EF9F27']].map(([k,l,c])=>`
      <div class="stat-row">
        <label>${l}</label>
        <input type="range" min="0" max="100" step="1" value="${p[k]}" id="fs${k}" style="accent-color:${c}" oninput="document.getElementById('sv${k}').textContent=this.value">
        <span class="stat-val" id="sv${k}">${p[k]}</span>
      </div>`).join('')}
    </div>
    <div class="form-row"><label>Notas</label><textarea id="fnt" rows="2" style="resize:none">${esc(p.notas||'')}</textarea></div>
    <div class="modal-actions">
      ${isEdit?`<button class="btn-red btn-sm" id="btn-del">Eliminar</button>`:''}
      <button class="btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn-blue btn-sm" id="btn-save">Guardar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('btn-save').addEventListener('click',()=>savePlayer(p.id,isEdit));
  if(isEdit){
    document.getElementById('btn-del').addEventListener('click',()=>{
      if(confirm('¿Eliminar a "'+p.n+'"? No se puede deshacer.')){
        S.players=S.players.filter(x=>x.id!==p.id);
        removePlayerFromAllSlots(p.id);
        saveStorage();closeModal();render();
      }
    });
  }
  setTimeout(()=>{const fn=document.getElementById('fn');if(fn)fn.focus()},60);
}

function savePlayer(id,isEdit){
  const n=document.getElementById('fn').value.trim();
  if(!n){alert('El nombre es obligatorio');return}
  const p={id,n,d:document.getElementById('fd').value,
    A:parseInt(document.getElementById('fsA').value),M:parseInt(document.getElementById('fsM').value),
    T:parseInt(document.getElementById('fsT').value),Q:parseInt(document.getElementById('fsQ').value),
    pos:document.getElementById('fp').value,pie:document.getElementById('fpie').value,
    notas:document.getElementById('fnt').value};
  if(isEdit)S.players=S.players.map(x=>x.id===id?p:x);
  else S.players.push(p);
  saveStorage();closeModal();render();
}
function closeModal(){const o=document.getElementById('modal-overlay');if(o)o.remove()}

function renderFieldForTeam(teamKey){
  const team=S.teams[teamKey];

  const rowsHtml=POS_KEYS.map(row=>{

        return`<div class="player-slot occupied" style="border-color:${tc.main};background:${tc.main}28"

        <span style="font-size:9px;color:rgba(255,255,255,0.28)">${POS_LABELS[row]}</span>

  const subsHtml=`<div class="subs-section" ondragover="event.preventDefault()" ondrop="handleSubsDrop(event,'${teamKey}')">
    <div style="font-size:9px;color:rgba(255,255,255,0.38);margin-bottom:3px">Suplentes${team.subs.length===0?' — arrastrá aquí':''}</div>

      <div class="metric-card"><div class="metric-label">Equipo Azul</div><div class="metric-val" style="color:var(--blue)">${sumA}</div></div>
      <div class="metric-card"><div class="metric-label">Equipo Rojo</div><div class="metric-val" style="color:var(--red)">${sumB}</div></div>
      <div class="metric-card"><div class="metric-label">Diferencia</div><div class="metric-val" style="color:${diff>20?'var(--red)':diff>10?'var(--amber)':'var(--green)'}">${diff}</div></div>
      <div class="metric-card"><div class="metric-label">Balance</div><div class="metric-val" style="font-size:13px;color:${diff<=5?'var(--green)':diff<=15?'var(--amber)':'var(--red)'}">${diff<=5?'Excelente':diff<=15?'Bueno':diff<=25?'Aceptable':'Desigual'}</div></div>
    </div>
    ${S.kickoff?`<div style="background:${TEAM_COLORS[S.kickoff].main}18;border:0.5px solid ${TEAM_COLORS[S.kickoff].main};border-radius:var(--radius-md);padding:8px 12px;font-size:13px;display:flex;align-items:center;gap:8px">
      <span style="font-size:22px">⚽</span>
      <span><strong>Equipo ${TEAM_COLORS[S.kickoff].name}</strong> ganó el sorteo y comienza con la pelota.</span>
    </div>`:''}`:'';

  let mainContent='';
  if(S.view==='field'&&hasTeams){
    mainContent=`<div class="fields-grid">${renderFieldForTeam('A')}${renderFieldForTeam('B')}</div>`;
  }else if(S.view==='list'){
    mainContent=renderListView();
  }else{
    mainContent=`<div class="empty-state">
      <div class="empty-icon">⚽</div>
      <div style="font-size:14px;margin-bottom:6px;color:var(--text2)">Sin equipos armados</div>
      <div style="font-size:12px">Tocá "2 equipos" para comenzar.</div>
    </div>`;
  }

  const explHtml=S.explanation.length>0?`
    <details style="border:0.5px solid var(--border1);border-radius:var(--radius-md);padding:10px">
      <summary style="cursor:pointer;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em">
        Cómo se armaron los equipos (${S.explanation.length} asignaciones)
      </summary>
      <div style="margin-top:8px">
        ${S.explanation.map(e=>`<div class="explain-item">
          <span class="tag" style="background:${e.team==='A'?'var(--blue-l)':'var(--red-l)'};color:${e.team==='A'?'var(--blue-d)':'var(--red-d)'};flex-shrink:0">${e.team==='A'?'Azul':'Rojo'}</span>
          <span style="font-weight:600">${esc(e.player.n)}</span>
          <span style="color:var(--text3)">→ ${e.pos} · ${e.reason}</span>
        </div>`).join('')}
      </div>
    </details>`:'';

  const savedHtml=S.savedTeams.length>0?`
    <div class="saved-row">
      <span style="font-size:11px;color:var(--text2);flex-shrink:0">Guardados:</span>
      ${S.savedTeams.slice().reverse().map(t=>`
        <button class="btn-sm" onclick='loadSaved(${JSON.stringify(t)})'>${esc(t.name)} <span style="opacity:0.55;font-size:10px">${t.date}</span></button>
        <button class="btn-sm" onclick="deleteSaved('${t.id}')" style="padding:3px 8px">×</button>`).join('')}
    </div>`:'';

  return`<div class="content">${metricsHtml}${mainContent}${explHtml}${savedHtml}</div>`;
}

/* RENDER PRINCIPAL */
function render(){
  const hasTeams=S.hasSplit||S.teams.A.gk||(S.teams.A.slots.A||[]).length>0;
  document.getElementById('app').innerHTML=`
    <div class="topbar">
      <span class="topbar-title">⚽ FutbolApp</span>
      <div style="display:flex;gap:4px">
        <button class="mode-btn${S.mode==='F5'?' active':''}" onclick="S.mode='F5';render()">F5</button>
        <button class="mode-btn${S.mode==='F7'?' active':''}" onclick="S.mode='F7';render()">F7</button>
      </div>
      <div class="desktop-only" style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
        <button class="btn-green" onclick="splitBalanced()">Dividir en 2 equipos</button>
        ${hasTeams?`<button class="btn-gold" onclick="launchCoin()">Lanzar moneda 🪙</button>`:''}
        <button onclick="S.teams=emptyTeams();S.hasSplit=false;S.explanation=[];S.kickoff=null;S.gkRotation={A:[],B:[]};render()">Limpiar</button>
        <button onclick="saveTeam()">Guardar...</button>
      </div>
      <div class="tab-row">
        <div class="tab${S.view==='field'?' active':''}" onclick="S.view='field';render()">Cancha</div>
        <div class="tab${S.view==='list'?' active':''}" onclick="S.view='list';render()">Lista</div>
      </div>
    </div>
    <div class="main">
      ${renderSidebar()}
      ${renderContent()}
    </div>
    <div class="mobile-bar">
      <button class="btn-green" onclick="splitBalanced()">2 equipos</button>
      ${hasTeams?`<button class="btn-gold" onclick="launchCoin()">Moneda 🪙</button>`:''}
      ${hasTeams?`<button class="btn-blue" onclick="randomGKRotation('A')">Arq. Azul</button>`:''}
      ${hasTeams?`<button class="btn-red" onclick="randomGKRotation('B')">Arq. Rojo</button>`:''}
      <button onclick="saveTeam()">Guardar</button>
      <button onclick="S.view=S.view==='field'?'list':'field';render()">${S.view==='field'?'Lista':'Cancha'}</button>
    </div>`;
}

render();
</script>
</body>
</html>
