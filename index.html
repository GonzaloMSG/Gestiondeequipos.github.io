<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutbolApp — Armador de Equipos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#ffffff;--bg2:#f5f5f5;--bg3:#ececec;
  --text1:#111111;--text2:#555555;--text3:#888888;
  --border1:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --radius-md:8px;--radius-lg:12px;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;
  --red:#A32D2D;--red-l:#FCEBEB;--red-d:#791F1F;
  --green:#3B6D11;--amber:#854F0B;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg1:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text1:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border1:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --blue-l:#0c2d4f;--red-l:#4a1515;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:var(--text1);background:var(--bg2);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:1400px;margin:0 auto;background:var(--bg1);border-left:0.5px solid var(--border1);border-right:0.5px solid var(--border1)}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:0.5px solid var(--border1);background:var(--bg2);flex-wrap:wrap;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:600;color:var(--text1);margin-right:4px}
.main{display:grid;grid-template-columns:220px 1fr;flex:1}
@media(max-width:700px){.main{grid-template-columns:1fr}}
.sidebar{border-right:0.5px solid var(--border1);display:flex;flex-direction:column;height:calc(100vh - 49px);position:sticky;top:49px;overflow:hidden}
@media(max-width:700px){.sidebar{height:auto;position:static;border-right:none;border-bottom:0.5px solid var(--border1)}}
.sidebar-header{padding:8px 10px;border-bottom:0.5px solid var(--border1);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-filters{padding:6px;border-bottom:0.5px solid var(--border1);flex-shrink:0}
.sidebar-body{flex:1;overflow-y:auto;padding:6px}
.content{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
input,select,textarea{padding:6px 9px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:var(--bg1);color:var(--text1);font-size:12px;font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
button{padding:6px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:var(--bg1);color:var(--text1);font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .15s,opacity .15s}
button:hover{background:var(--bg2)}
button:active{transform:scale(0.97)}
.btn-blue{background:var(--blue)!important;color:#fff!important;border-color:var(--blue)!important}
.btn-blue:hover{background:var(--blue-d)!important}
.btn-green{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important}
.btn-green:hover{background:#27500A!important}
.btn-red{background:var(--red)!important;color:#fff!important;border-color:var(--red)!important}
.btn-red:hover{background:var(--red-d)!important}
.btn-sm{padding:3px 8px;font-size:11px}
.pcard{border:0.5px solid var(--border1);border-radius:var(--radius-md);padding:6px 8px;margin-bottom:5px;cursor:grab;background:var(--bg1);transition:border-color .15s,opacity .15s}
.pcard:hover{border-color:var(--border2)}
.pcard.in-team{opacity:0.45}
.pcard-name{font-weight:600;font-size:12px;color:var(--text1)}
.pcard-meta{font-size:10px;color:var(--text2);margin-top:1px}
.global-bar-wrap{height:4px;background:var(--bg3);border-radius:2px;margin-top:4px;overflow:hidden}
.global-bar{height:100%;border-radius:2px;transition:width .3s}
.field-wrap{border-radius:var(--radius-md);overflow:hidden;border:0.5px solid var(--border2)}
.field-header{padding:7px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between;color:#fff}
.field-body{position:relative;background:#2a6e2a;padding:10px 8px 8px}
.field-svg-lines{position:absolute;inset:0;pointer-events:none;opacity:0.2}
.field-rows{display:flex;flex-direction:column;gap:8px;position:relative;z-index:1}
.field-row{display:flex;gap:6px;justify-content:center;align-items:center}
.field-row-label{font-size:9px;color:rgba(255,255,255,0.45);width:34px;text-align:right;flex-shrink:0}
.player-slot{border:1.5px dashed rgba(255,255,255,0.3);border-radius:8px;min-width:72px;min-height:64px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.player-slot.drag-over{border-color:#fff;background:rgba(255,255,255,0.15)}
.player-slot.occupied{border-style:solid}
.player-chip{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 4px;width:100%;user-select:none}
.chip-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.chip-name{font-size:9px;color:#fff;font-weight:500;text-align:center;line-height:1.2;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-global{font-size:9px;font-weight:600}
.chip-gk-badge{font-size:8px;background:rgba(255,200,0,0.9);color:#412402;padding:1px 5px;border-radius:8px;font-weight:600}
.chip-remove{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;border:none;padding:0;line-height:1}
.player-slot:hover .chip-remove{opacity:1}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:600px){.metrics-row{grid-template-columns:repeat(2,1fr)}}
.metric-card{background:var(--bg2);border-radius:var(--radius-md);padding:8px 12px}
.metric-label{font-size:10px;color:var(--text2);margin-bottom:2px}
.metric-val{font-size:22px;font-weight:600;color:var(--text1)}
.fields-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.tab-row{display:flex;gap:4px}
.tab{padding:5px 12px;font-size:12px;border-radius:var(--radius-md);border:0.5px solid var(--border2);cursor:pointer;background:var(--bg1);color:var(--text1)}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.mode-btn{padding:5px 10px;font-size:12px;border-radius:var(--radius-md);border:0.5px solid var(--border2);cursor:pointer;background:var(--bg1);color:var(--text1)}
.mode-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500}
.section-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.explain-list{font-size:11px;color:var(--text2);line-height:1.8}
.explain-item{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:0.5px solid var(--border1)}
.explain-item:last-child{border-bottom:none}
.list-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.list-table th{font-size:10px;font-weight:600;color:var(--text2);text-align:left;padding:5px 6px;border-bottom:0.5px solid var(--border1);background:var(--bg2)}
.list-table td{padding:6px 6px;border-bottom:0.5px solid var(--border1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-table tr:hover td{background:var(--bg2)}
.subs-section{border-top:0.5px solid rgba(255,255,255,0.1);margin-top:6px;padding-top:5px}
.sub-chip{display:inline-block;background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.2);border-radius:12px;padding:2px 8px;font-size:9px;color:rgba(255,255,255,0.7);margin:2px;cursor:grab}
.sub-chip:hover{background:rgba(255,255,255,0.2)}
.warn-box{background:#FAEEDA;color:#633806;border-radius:var(--radius-md);padding:7px 10px;font-size:11px;border:0.5px solid #EF9F27}
.saved-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-box{background:var(--bg1);border-radius:var(--radius-lg);border:0.5px solid var(--border2);width:100%;max-width:400px;max-height:90vh;overflow-y:auto;padding:20px;position:relative}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text1)}
.form-row{margin-bottom:11px}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-section{background:var(--bg2);border-radius:var(--radius-md);padding:10px;margin-bottom:11px}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.stat-row:last-child{margin-bottom:0}
.stat-row label{width:65px;font-size:11px;color:var(--text2);flex-shrink:0}
.stat-row input[type=range]{flex:1;accent-color:var(--blue);cursor:pointer}
.stat-val{width:28px;text-align:right;font-size:13px;font-weight:600;color:var(--text1)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ===== CONSTANTES ===== */
const TEAM_COLORS = {
  A: { main: '#185FA5', light: '#E6F1FB', dark: '#0C447C', name: 'Azul' },
  B: { main: '#A32D2D', light: '#FCEBEB', dark: '#791F1F', name: 'Rojo' }
};
const POS_LABELS = { A: 'Adelante', M: 'Medio', T: 'Atrás' };
const POS_KEYS = ['A', 'M', 'T'];
const AVATAR_COLS = ['#185FA5','#0F6E56','#993C1D','#534AB7','#993556','#639922','#854F0B','#A32D2D'];
const F5_SLOTS = { A: 2, M: 1, T: 1 };
const F7_SLOTS = { A: 2, M: 2, T: 2 };

/* ===== ESTADO ===== */
let S = {
  players: loadStorage('fbv2_players') || defaultPlayers(),
  mode: 'F7',
  view: 'field',
  teams: emptyTeams(),
  hasSplit: false,
  dragPid: null,
  dragFrom: null,
  search: '',
  posFilter: '',
  explanation: [],
  savedTeams: loadStorage('fbv2_saved') || [],
  weights: {
    G: { A: 0.35, M: 0.30, T: 0.25, Q: 0.10 },
    A: { A: 0.70, M: 0.20, T: 0.05, Q: 0.05 },
    M: { A: 0.15, M: 0.60, T: 0.20, Q: 0.05 },
    T: { A: 0.05, M: 0.25, T: 0.65, Q: 0.05 },
    Q: { A: 0.00, M: 0.05, T: 0.10, Q: 0.85 }
  }
};

function emptyTeams() {
  return {
    A: { slots: { A: [], M: [], T: [] }, gk: null, subs: [] },
    B: { slots: { A: [], M: [], T: [] }, gk: null, subs: [] }
  };
}

function loadStorage(key) {
  try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
}

function saveStorage() {
  localStorage.setItem('fbv2_players', JSON.stringify(S.players));
  localStorage.setItem('fbv2_saved', JSON.stringify(S.savedTeams));
}

/* ===== JUGADORES POR DEFECTO ===== */
function defaultPlayers() {
  return [
    { id: 'p1',  n: 'Carlos Méndez',    d: '1',  A: 20, M: 30, T: 40, Q: 88, pos: 'T', pie: 'Der', notas: 'Buen arquero' },
    { id: 'p2',  n: 'Diego Flores',     d: '4',  A: 25, M: 55, T: 80, Q: 10, pos: 'T', pie: 'Der', notas: '' },
    { id: 'p3',  n: 'Matías Romero',    d: '5',  A: 30, M: 60, T: 75, Q: 5,  pos: 'T', pie: 'Zur', notas: '' },
    { id: 'p4',  n: 'Lucas García',     d: '3',  A: 45, M: 65, T: 55, Q: 0,  pos: 'T', pie: 'Der', notas: '' },
    { id: 'p5',  n: 'Andrés Suárez',    d: '6',  A: 40, M: 72, T: 60, Q: 0,  pos: 'M', pie: 'Der', notas: '' },
    { id: 'p6',  n: 'Fernando López',   d: '8',  A: 65, M: 78, T: 40, Q: 0,  pos: 'M', pie: 'Der', notas: '' },
    { id: 'p7',  n: 'Sebastián Ruiz',   d: '10', A: 80, M: 70, T: 20, Q: 0,  pos: 'M', pie: 'Zur', notas: 'Capitán' },
    { id: 'p8',  n: 'Nicolás Torres',   d: '7',  A: 75, M: 55, T: 30, Q: 0,  pos: 'A', pie: 'Der', notas: '' },
    { id: 'p9',  n: 'Rodrigo Jiménez',  d: '11', A: 70, M: 50, T: 25, Q: 0,  pos: 'A', pie: 'Zur', notas: '' },
    { id: 'p10', n: 'Pablo Martínez',   d: '9',  A: 90, M: 60, T: 15, Q: 0,  pos: 'A', pie: 'Der', notas: 'Goleador' },
    { id: 'p11', n: 'Tomás Vargas',     d: '2',  A: 85, M: 55, T: 20, Q: 0,  pos: 'A', pie: 'Zur', notas: '' },
    { id: 'p12', n: 'Ramiro Castro',    d: '12', A: 50, M: 60, T: 50, Q: 15, pos: 'M', pie: 'Der', notas: 'Puede atajar' }
  ];
}

/* ===== CÁLCULOS ===== */
function calcGlobal(p) {
  const w = S.weights.G;
  return Math.round(w.A * p.A + w.M * p.M + w.T * p.T + w.Q * p.Q);
}
function calcScore(p, pos) {
  const w = S.weights[pos] || S.weights.M;
  return Math.round(w.A * p.A + w.M * p.M + w.T * p.T + w.Q * p.Q);
}
function getGlobalColor(g) {
  return g >= 75 ? '#3B6D11' : g >= 50 ? '#854F0B' : '#A32D2D';
}
function getInitials(n) {
  return n.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}
function getAvatarColor(id) {
  return AVATAR_COLS[Math.abs([...id].reduce((a, c) => a + c.charCodeAt(0), 0)) % AVATAR_COLS.length];
}
function getSlotCount() {
  return S.mode === 'F5' ? F5_SLOTS : F7_SLOTS;
}
function playerById(id) {
  return S.players.find(p => p.id === id);
}
function allInTeamIds() {
  const ids = new Set();
  ['A', 'B'].forEach(t => {
    POS_KEYS.forEach(r => (S.teams[t].slots[r] || []).forEach(id => id && ids.add(id)));
    if (S.teams[t].gk) ids.add(S.teams[t].gk);
    S.teams[t].subs.forEach(id => ids.add(id));
  });
  return ids;
}
function getTeamSum(t) {
  let s = 0;
  POS_KEYS.forEach(r => (S.teams[t].slots[r] || []).forEach(id => {
    const p = playerById(id); if (p) s += calcGlobal(p);
  }));
  if (S.teams[t].gk) { const p = playerById(S.teams[t].gk); if (p) s += calcGlobal(p); }
  return s;
}

/* ===== ALGORITMO DIVISIÓN EQUILIBRADA ===== */
function splitBalanced() {
  const sc = getSlotCount();
  const all = S.players.map(p => ({ ...p, global: calcGlobal(p) })).sort((a, b) => b.global - a.global);
  const used = new Set();
  const expls = [];

  const newTeams = emptyTeams();

  // 1. Asignar arqueros: los 2 con mayor stat Q
  const byQ = [...all].sort((a, b) => b.Q - a.Q);
  if (byQ[0]) { newTeams.A.gk = byQ[0].id; used.add(byQ[0].id); expls.push({ team: 'A', player: byQ[0], pos: 'Arquero', reason: `Mejor stat arquero: ${byQ[0].Q}` }); }
  if (byQ[1]) { newTeams.B.gk = byQ[1].id; used.add(byQ[1].id); expls.push({ team: 'B', player: byQ[1], pos: 'Arquero', reason: `2° mejor arquero: ${byQ[1].Q}` }); }

  // 2. Greedy balanceado por línea
  let sumA = newTeams.A.gk ? calcGlobal(playerById(newTeams.A.gk)) : 0;
  let sumB = newTeams.B.gk ? calcGlobal(playerById(newTeams.B.gk)) : 0;

  POS_KEYS.forEach(row => {
    const cnt = sc[row];
    for (let i = 0; i < cnt * 2; i++) {
      const cands = all.filter(p => !used.has(p.id)).sort((a, b) => calcScore(b, row) - calcScore(a, row));
      if (!cands.length) break;
      const p = cands[0];
      const team = sumA <= sumB ? 'A' : 'B';
      newTeams[team].slots[row].push(p.id);
      if (team === 'A') sumA += p.global; else sumB += p.global;
      used.add(p.id);
      expls.push({ team, player: p, pos: POS_LABELS[row], reason: `Score ${calcScore(p, row)} en ${POS_LABELS[row]}, global ${p.global}` });
    }
  });

  // 3. Suplentes: repartir restantes
  const subs = all.filter(p => !used.has(p.id)).map(p => p.id);
  const half = Math.ceil(subs.length / 2);
  newTeams.A.subs = subs.slice(0, half);
  newTeams.B.subs = subs.slice(half);

  S.teams = newTeams;
  S.hasSplit = true;
  S.view = 'field';
  S.explanation = expls;
  render();
}

/* ===== DRAG & DROP ===== */
function handleSlotDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function handleSlotDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function handleSlotDrop(e, team, row, idx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const pid = S.dragPid; if (!pid) return;
  removePlayerFromAllSlots(pid);
  const slots = S.teams[team].slots[row];
  while (slots.length <= idx) slots.push(null);
  slots[idx] = pid;
  S.dragPid = null; S.dragFrom = null;
  render();
}
function handleGKDrop(e, team) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const pid = S.dragPid; if (!pid) return;
  removePlayerFromAllSlots(pid);
  S.teams[team].gk = pid;
  S.dragPid = null; S.dragFrom = null;
  render();
}
function handleSubsDrop(e, team) {
  e.preventDefault();
  const pid = S.dragPid; if (!pid) return;
  removePlayerFromAllSlots(pid);
  S.teams[team].subs.push(pid);
  S.dragPid = null; S.dragFrom = null;
  render();
}
function removePlayerFromAllSlots(pid) {
  ['A', 'B'].forEach(t => {
    POS_KEYS.forEach(r => {
      S.teams[t].slots[r] = S.teams[t].slots[r].map(x => x === pid ? null : x);
    });
    S.teams[t].subs = S.teams[t].subs.filter(x => x !== pid);
    if (S.teams[t].gk === pid) S.teams[t].gk = null;
  });
}
function removeFromSlot(team, row, idx) {
  S.teams[team].slots[row][idx] = null;
  render();
}
function removeGK(team) {
  S.teams[team].gk = null;
  render();
}
function removeFromSubs(team, pid) {
  S.teams[team].subs = S.teams[team].subs.filter(x => x !== pid);
  render();
}

/* ===== MODAL JUGADOR ===== */
let modalCallback = null;

function openModal(player) {
  const isEdit = !!player;
  const p = player
    ? { ...player }
    : { id: 'p' + Date.now(), n: '', d: '', A: 60, M: 60, T: 60, Q: 20, pos: 'M', pie: 'Der', notas: '' };

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });

  overlay.innerHTML = `
    <div class="modal-box" role="dialog" aria-modal="true" aria-label="${isEdit ? 'Editar jugador' : 'Nuevo jugador'}">
      <div class="modal-title">${isEdit ? 'Editar jugador' : 'Nuevo jugador'}</div>
      <div class="form-grid-2">
        <div class="form-row"><label for="fn">Nombre *</label><input id="fn" value="${esc(p.n)}" placeholder="Nombre completo" autocomplete="off"></div>
        <div class="form-row"><label for="fd">Dorsal</label><input id="fd" value="${esc(p.d || '')}" type="number" min="1" max="99" placeholder="#"></div>
      </div>
      <div class="form-grid-2">
        <div class="form-row"><label for="fp">Posición preferida</label>
          <select id="fp">
            <option value="A"${p.pos === 'A' ? ' selected' : ''}>Adelante</option>
            <option value="M"${p.pos === 'M' ? ' selected' : ''}>Medio</option>
            <option value="T"${p.pos === 'T' ? ' selected' : ''}>Atrás</option>
          </select>
        </div>
        <div class="form-row"><label for="fpie">Pie dominante</label>
          <select id="fpie">
            <option${p.pie === 'Der' ? ' selected' : ''}>Der</option>
            <option${p.pie === 'Zur' ? ' selected' : ''}>Zur</option>
            <option${p.pie === 'Amb' ? ' selected' : ''}>Amb</option>
          </select>
        </div>
      </div>
      <div class="stat-section">
        <div class="section-title">Estadísticas (0–100)</div>
        ${[['A','Adelante','#378ADD'],['M','Medio','#1D9E75'],['T','Atrás','#BA7517'],['Q','Arquero','#EF9F27']].map(([k, l, c]) => `
        <div class="stat-row">
          <label for="fs${k}">${l}</label>
          <input type="range" min="0" max="100" step="1" value="${p[k]}" id="fs${k}" style="accent-color:${c}" oninput="document.getElementById('sv${k}').textContent=this.value">
          <span class="stat-val" id="sv${k}">${p[k]}</span>
        </div>`).join('')}
      </div>
      <div class="form-row"><label for="fnt">Notas</label><textarea id="fnt" rows="2" style="resize:none">${esc(p.notas || '')}</textarea></div>
      <div class="modal-actions">
        ${isEdit ? `<button class="btn-red btn-sm" id="btn-delete-player" type="button">Eliminar</button>` : ''}
        <button class="btn-sm" type="button" onclick="closeModal()">Cancelar</button>
        <button class="btn-blue btn-sm" type="button" id="btn-save-player">Guardar</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  // Asignar eventos DESPUÉS de insertar en el DOM
  document.getElementById('btn-save-player').addEventListener('click', function() {
    savePlayer(p.id, isEdit);
  });

  if (isEdit) {
    document.getElementById('btn-delete-player').addEventListener('click', function() {
      confirmDelete(p.id);
    });
  }

  document.getElementById('fn').focus();
}

function confirmDelete(id) {
  const p = playerById(id);
  if (!p) return;
  if (confirm(`¿Eliminar a "${p.n}"? Esta acción no se puede deshacer.`)) {
    doDeletePlayer(id);
  }
}

function doDeletePlayer(id) {
  S.players = S.players.filter(p => p.id !== id);
  removePlayerFromAllSlots(id);
  saveStorage();
  closeModal();
  render();
}

function savePlayer(id, isEdit) {
  const n = document.getElementById('fn').value.trim();
  if (!n) { alert('El nombre es obligatorio'); return; }
  const p = {
    id,
    n,
    d: document.getElementById('fd').value,
    A: parseInt(document.getElementById('fsA').value),
    M: parseInt(document.getElementById('fsM').value),
    T: parseInt(document.getElementById('fsT').value),
    Q: parseInt(document.getElementById('fsQ').value),
    pos: document.getElementById('fp').value,
    pie: document.getElementById('fpie').value,
    notas: document.getElementById('fnt').value
  };
  if (isEdit) {
    S.players = S.players.map(x => x.id === id ? p : x);
  } else {
    S.players.push(p);
  }
  saveStorage();
  closeModal();
  render();
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  if (overlay) overlay.remove();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ===== GUARDAR / CARGAR EQUIPOS ===== */
function saveTeam() {
  const name = prompt('Nombre para guardar el equipo:');
  if (!name) return;
  S.savedTeams.push({
    id: 't' + Date.now(),
    name,
    mode: S.mode,
    teams: JSON.parse(JSON.stringify(S.teams)),
    date: new Date().toLocaleDateString('es-AR')
  });
  saveStorage();
  alert('Equipo guardado correctamente.');
  render();
}

function loadSaved(t) {
  S.mode = t.mode;
  S.teams = t.teams;
  S.hasSplit = true;
  S.view = 'field';
  S.explanation = [];
  render();
}

function deleteSaved(id) {
  S.savedTeams = S.savedTeams.filter(x => x.id !== id);
  saveStorage();
  render();
}

/* ===== RENDER CANCHA ===== */
function renderFieldForTeam(teamKey) {
  const team = S.teams[teamKey];
  const sc = getSlotCount();
  const tc = TEAM_COLORS[teamKey];

  const rowsHtml = POS_KEYS.map(row => {
    const cnt = sc[row];
    const ids = team.slots[row] || [];
    const slotsHtml = Array.from({ length: cnt }, (_, i) => {
      const pid = ids[i];
      const p = pid ? playerById(pid) : null;
      if (p) {
        const g = calcGlobal(p);
        return `<div class="player-slot occupied"
          style="border-color:${tc.main};background:${tc.main}2a"
          ondragover="handleSlotDragOver(event)"
          ondragleave="handleSlotDragLeave(event)"
          ondrop="handleSlotDrop(event,'${teamKey}','${row}',${i})">
          <button class="chip-remove" onclick="removeFromSlot('${teamKey}','${row}',${i})" title="Quitar">×</button>
          <div class="player-chip" draggable="true"
            ondragstart="S.dragPid='${p.id}';S.dragFrom={team:'${teamKey}',row:'${row}',idx:${i}}">
            <div class="chip-avatar" style="background:${getAvatarColor(p.id)}">${getInitials(p.n)}</div>
            <div class="chip-name">${p.n.split(' ')[0]}${p.d ? ' #' + p.d : ''}</div>
            <div class="chip-global" style="color:${getGlobalColor(g)}">${g}</div>
          </div>
        </div>`;
      } else {
        return `<div class="player-slot"
          ondragover="handleSlotDragOver(event)"
          ondragleave="handleSlotDragLeave(event)"
          ondrop="handleSlotDrop(event,'${teamKey}','${row}',${i})">
          <span style="font-size:9px;color:rgba(255,255,255,0.3)">${POS_LABELS[row]}</span>
        </div>`;
      }
    }).join('');

    return `<div class="field-row">
      <div class="field-row-label">${POS_LABELS[row]}</div>
      ${slotsHtml}
    </div>`;
  }).join('');

  const gkp = team.gk ? playerById(team.gk) : null;
  const gkHtml = `<div class="field-row">
    <div class="field-row-label">Arq.</div>
    <div class="player-slot${gkp ? ' occupied' : ''}"
      style="${gkp ? 'border-color:#EF9F27;background:#EF9F2725' : 'border-color:rgba(255,200,0,0.3)'}"
      ondragover="handleSlotDragOver(event)"
      ondragleave="handleSlotDragLeave(event)"
      ondrop="handleGKDrop(event,'${teamKey}')">
      ${gkp ? `
        <button class="chip-remove" onclick="removeGK('${teamKey}')" title="Quitar">×</button>
        <div class="player-chip" draggable="true"
          ondragstart="S.dragPid='${gkp.id}';S.dragFrom={team:'${teamKey}',row:'GK',idx:0}">
          <div class="chip-avatar" style="background:#854F0B">${getInitials(gkp.n)}</div>
          <div class="chip-name">${gkp.n.split(' ')[0]}${gkp.d ? ' #' + gkp.d : ''}</div>
          <div class="chip-gk-badge">ARQ</div>
          <div class="chip-global">${calcGlobal(gkp)}</div>
        </div>` : `<span style="font-size:9px;color:rgba(255,200,0,0.4)">Arquero</span>`}
    </div>
  </div>`;

  const subsHtml = team.subs.length > 0 ? `
    <div class="subs-section"
      ondragover="event.preventDefault()"
      ondrop="handleSubsDrop(event,'${teamKey}')">
      <div style="font-size:9px;color:rgba(255,255,255,0.4);margin-bottom:3px">Suplentes</div>
      ${team.subs.map(id => {
        const p = playerById(id);
        return p ? `<span class="sub-chip" draggable="true"
          ondragstart="S.dragPid='${p.id}';S.dragFrom={team:'${teamKey}',row:'SUB',idx:-1}"
          onclick="removeFromSubs('${teamKey}','${p.id}')"
          title="Clic para quitar">${p.n.split(' ')[0]}</span>` : '';
      }).join('')}
    </div>` : `<div class="subs-section" ondragover="event.preventDefault()" ondrop="handleSubsDrop(event,'${teamKey}')">
      <div style="font-size:9px;color:rgba(255,255,255,0.2)">Arrastrá un jugador aquí como suplente</div>
    </div>`;

  const teamSum = getTeamSum(teamKey);
  return `<div class="field-wrap">
    <div class="field-header" style="background:${tc.main}">
      <span>Equipo ${tc.name} — ${S.mode}</span>
      <span style="font-size:11px;opacity:0.85">Global: ${teamSum}</span>
    </div>
    <div class="field-body">
      <svg class="field-svg-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
        <line x1="50" y1="0" x2="50" y2="100" stroke="white" stroke-width="0.5"/>
        <ellipse cx="50" cy="50" rx="18" ry="12" fill="none" stroke="white" stroke-width="0.5"/>
        <rect x="28" y="0" width="44" height="18" fill="none" stroke="white" stroke-width="0.5"/>
        <rect x="28" y="82" width="44" height="18" fill="none" stroke="white" stroke-width="0.5"/>
        <rect x="38" y="0" width="24" height="9" fill="none" stroke="white" stroke-width="0.5"/>
        <rect x="38" y="91" width="24" height="9" fill="none" stroke="white" stroke-width="0.5"/>
      </svg>
      <div class="field-rows">${rowsHtml}${gkHtml}</div>
      ${subsHtml}
    </div>
  </div>`;
}

/* ===== RENDER LISTA ===== */
function renderListView() {
  const allIn = allInTeamIds();
  return `<div style="overflow-x:auto">
    <table class="list-table">
      <thead><tr>
        <th style="width:28%">Jugador</th>
        <th style="width:10%">Pos.</th>
        <th style="width:8%">Ade.</th>
        <th style="width:8%">Med.</th>
        <th style="width:8%">Atr.</th>
        <th style="width:8%">Arq.</th>
        <th style="width:10%">Global</th>
        <th style="width:10%">Equipo</th>
        <th style="width:10%"></th>
      </tr></thead>
      <tbody>
        ${S.players.map(p => {
          const g = calcGlobal(p);
          const inA = S.hasSplit && ([...(S.teams.A.slots.A || []), ...(S.teams.A.slots.M || []), ...(S.teams.A.slots.T || []), S.teams.A.gk, ...S.teams.A.subs].filter(Boolean).includes(p.id));
          const inB = S.hasSplit && ([...(S.teams.B.slots.A || []), ...(S.teams.B.slots.M || []), ...(S.teams.B.slots.T || []), S.teams.B.gk, ...S.teams.B.subs].filter(Boolean).includes(p.id));
          return `<tr>
            <td>
              <div style="display:flex;align-items:center;gap:6px">
                <div class="chip-avatar" style="background:${getAvatarColor(p.id)};width:24px;height:24px;font-size:9px;flex-shrink:0">${getInitials(p.n)}</div>
                <span style="font-weight:500">${esc(p.n)}</span>${p.d ? `<span style="color:var(--text3)">#${p.d}</span>` : ''}
              </div>
            </td>
            <td>${POS_LABELS[p.pos] || p.pos}</td>
            <td>${p.A}</td><td>${p.M}</td><td>${p.T}</td><td>${p.Q}</td>
            <td><span style="font-weight:600;color:${getGlobalColor(g)}">${g}</span></td>
            <td>${inA ? `<span class="tag" style="background:var(--blue-l);color:var(--blue-d)">Azul</span>` : inB ? `<span class="tag" style="background:var(--red-l);color:var(--red-d)">Rojo</span>` : '-'}</td>
            <td><button class="btn-sm" onclick="openModal(S.players.find(x=>x.id==='${p.id}'))">Editar</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ===== RENDER SIDEBAR ===== */
function renderSidebar() {
  const fp = S.players.filter(p => {
    const nm = p.n.toLowerCase().includes(S.search.toLowerCase());
    const ps = !S.posFilter || p.pos === S.posFilter;
    return nm && ps;
  });
  const allIn = allInTeamIds();

  return `<div class="sidebar">
    <div class="sidebar-header">
      <span style="font-size:11px;font-weight:600">${S.players.length} jugadores</span>
      <button class="btn-blue btn-sm" onclick="openModal()">+ Nuevo</button>
    </div>
    <div class="sidebar-filters">
      <input placeholder="Buscar..." value="${esc(S.search)}" oninput="S.search=this.value;renderSidebarOnly()" style="margin-bottom:5px">
      <select oninput="S.posFilter=this.value;renderSidebarOnly()">
        <option value="">Todas las posiciones</option>
        <option value="A"${S.posFilter === 'A' ? ' selected' : ''}>Adelante</option>
        <option value="M"${S.posFilter === 'M' ? ' selected' : ''}>Medio</option>
        <option value="T"${S.posFilter === 'T' ? ' selected' : ''}>Atrás</option>
      </select>
    </div>
    <div class="sidebar-body" id="sidebar-list">
      ${fp.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text3)">Sin resultados</div>' :
        fp.map(p => {
          const g = calcGlobal(p);
          const inA = allIn.has(p.id) && S.teams.A && [...(S.teams.A.slots.A||[]),...(S.teams.A.slots.M||[]),...(S.teams.A.slots.T||[]),S.teams.A.gk,...S.teams.A.subs].filter(Boolean).includes(p.id);
          const inB = allIn.has(p.id) && !inA;
          return `<div class="pcard${allIn.has(p.id) ? ' in-team' : ''}"
            draggable="true"
            ondragstart="S.dragPid='${p.id}';S.dragFrom=null">
            <div style="display:flex;align-items:center;gap:7px">
              <div class="chip-avatar" style="background:${getAvatarColor(p.id)};width:28px;height:28px;font-size:10px;flex-shrink:0">${getInitials(p.n)}</div>
              <div style="flex:1;min-width:0">
                <div class="pcard-name">${esc(p.n)}${p.d ? ` <span style="color:var(--text3);font-weight:400">#${p.d}</span>` : ''}</div>
                <div class="pcard-meta">
                  ${POS_LABELS[p.pos]} · Global <span style="font-weight:600;color:${getGlobalColor(g)}">${g}</span>
                  ${inA ? '<span class="tag" style="background:var(--blue-l);color:var(--blue-d);margin-left:3px">A</span>' : ''}
                  ${inB ? '<span class="tag" style="background:var(--red-l);color:var(--red-d);margin-left:3px">R</span>' : ''}
                </div>
              </div>
              <button class="btn-sm" onclick="openModal(S.players.find(x=>x.id==='${p.id}'))" style="padding:2px 7px;flex-shrink:0">···</button>
            </div>
            <div class="global-bar-wrap"><div class="global-bar" style="width:${g}%;background:${getGlobalColor(g)}"></div></div>
          </div>`;
        }).join('')}
    </div>
  </div>`;
}

function renderSidebarOnly() {
  const el = document.querySelector('.sidebar');
  if (!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderSidebar();
  el.replaceWith(tmp.firstChild);
}

/* ===== RENDER CONTENIDO ===== */
function renderContent() {
  const sumA = getTeamSum('A'), sumB = getTeamSum('B');
  const diff = Math.abs(sumA - sumB);
  const hasTeams = S.hasSplit || S.teams.A.gk || (S.teams.A.slots.A || []).length > 0;

  const metricsHtml = hasTeams && S.view === 'field' ? `
    <div class="metrics-row">
      <div class="metric-card"><div class="metric-label">Equipo Azul</div><div class="metric-val" style="color:var(--blue)">${sumA}</div></div>
      <div class="metric-card"><div class="metric-label">Equipo Rojo</div><div class="metric-val" style="color:var(--red)">${sumB}</div></div>
      <div class="metric-card"><div class="metric-label">Diferencia</div><div class="metric-val" style="color:${diff > 20 ? 'var(--red)' : diff > 10 ? 'var(--amber)' : 'var(--green)'}">${diff}</div></div>
      <div class="metric-card"><div class="metric-label">Balance</div><div class="metric-val" style="font-size:14px;color:${diff <= 5 ? 'var(--green)' : diff <= 15 ? 'var(--amber)' : 'var(--red)'}">${diff <= 5 ? 'Excelente' : diff <= 15 ? 'Bueno' : diff <= 25 ? 'Aceptable' : 'Desigual'}</div></div>
    </div>` : '';

  let mainContent = '';
  if (S.view === 'field' && hasTeams) {
    mainContent = `<div class="fields-grid">${renderFieldForTeam('A')}${renderFieldForTeam('B')}</div>`;
  } else if (S.view === 'list') {
    mainContent = renderListView();
  } else {
    mainContent = `<div class="empty-state">
      <div class="empty-icon">⚽</div>
      <div style="font-size:14px;margin-bottom:6px;color:var(--text2)">Sin equipos armados</div>
      <div style="font-size:12px">Usá el botón "Dividir en 2 equipos" para comenzar.</div>
    </div>`;
  }

  const explHtml = S.explanation.length > 0 ? `
    <details style="border:0.5px solid var(--border1);border-radius:var(--radius-md);padding:10px">
      <summary style="cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em">
        Explicación del armado (${S.explanation.length} asignaciones)
      </summary>
      <div style="margin-top:10px">
        ${S.explanation.map(e => `
        <div class="explain-item">
          <span class="tag" style="background:${e.team === 'A' ? 'var(--blue-l)' : 'var(--red-l)'};color:${e.team === 'A' ? 'var(--blue-d)' : 'var(--red-d)'};flex-shrink:0">${e.team === 'A' ? 'Azul' : 'Rojo'}</span>
          <span style="font-weight:600">${esc(e.player.n)}</span>
          <span style="color:var(--text3)">→ ${e.pos} · ${e.reason}</span>
        </div>`).join('')}
      </div>
    </details>` : '';

  const savedHtml = S.savedTeams.length > 0 ? `
    <div class="saved-row">
      <span style="font-size:11px;color:var(--text2);flex-shrink:0">Equipos guardados:</span>
      ${S.savedTeams.slice().reverse().map(t => `
        <button class="btn-sm" onclick='loadSaved(${JSON.stringify(t)})'>${esc(t.name)} <span style="opacity:0.6;font-size:10px">${t.date}</span></button>
        <button class="btn-sm" onclick="deleteSaved('${t.id}')" style="padding:3px 6px">×</button>`).join('')}
    </div>` : '';

  return `<div class="content">
    ${metricsHtml}
    ${mainContent}
    ${explHtml}
    ${savedHtml}
  </div>`;
}

/* ===== RENDER PRINCIPAL ===== */
function render() {
  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <span class="topbar-title">⚽ FutbolApp</span>
      <div style="display:flex;gap:4px">
        <button class="mode-btn${S.mode === 'F5' ? ' active' : ''}" onclick="S.mode='F5';render()">F5</button>
        <button class="mode-btn${S.mode === 'F7' ? ' active' : ''}" onclick="S.mode='F7';render()">F7</button>
      </div>
      <button class="btn-green" onclick="splitBalanced()">Dividir en 2 equipos</button>
      <button onclick="S.teams=emptyTeams();S.hasSplit=false;S.explanation=[];render()">Limpiar campo</button>
      <button onclick="saveTeam()">Guardar equipo...</button>
      <div class="tab-row" style="margin-left:auto">
        <div class="tab${S.view === 'field' ? ' active' : ''}" onclick="S.view='field';render()" role="tab">Cancha</div>
        <div class="tab${S.view === 'list' ? ' active' : ''}" onclick="S.view='list';render()" role="tab">Lista</div>
      </div>
    </div>
    <div class="main">
      ${renderSidebar()}
      ${renderContent()}
    </div>`;
}

render();
</script>
</body>
</html>
